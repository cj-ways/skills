name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm ci

      - run: npm test

      - name: CLI smoke test
        run: |
          node bin/arcana.js --version
          node bin/arcana.js list
          node bin/arcana.js use find-unused > /dev/null
          node bin/arcana.js info find-unused
          node bin/arcana.js doctor
